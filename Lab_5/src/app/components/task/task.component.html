<div class="task-card">
  <div class="task-header">
    <h3>{{ task.title }}</h3>
    <span class="status-badge" [class]="task.status">{{ task.status }}</span>
  </div>
  <div class="task-body">
    <p>Создана: {{ task.createdAt | date:'medium' }}</p>
  </div>
  <div class="task-actions">
    <button class="btn-2010" [routerLink]="['/tasks', task.id]">Редактировать</button>
    @if(isAdmin) {
      <button class="btn-2010 btn-danger" (click)="onDelete()">Удалить</button>
    }
  </div>
</div>
